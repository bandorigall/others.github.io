<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오시는 길 · KIMCHIKURA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="js/include.js"></script>

<body>

  <main class="container">
    <section>
      <h2 class="section-title">공연장 정보</h2>
      <ul class="info-list">
        <li><span class="label">장소</span><span>경희대학교 서울캠퍼스 평화의전당</span></li>
        <li><span class="label">주소</span><span>서울 동대문구 경희대로 26</span></li>
        <li><span class="label">좌석</span><span>4,250석 (스탠딩 없음)</span></li>
      </ul>
    </section>

    <section>
      <h2 class="section-title">교통 안내</h2>
      <ul class="info-list">
        <li>
          <span class="label">지하철</span>
          <span>회기역 (1호선 · 경의중앙선) — 역에서 도보 거리가 있습니다.</span>
        </li>
        <li>
          <span class="label">버스</span>
          <span>경희대의료원 · 경희여중고 정류장 (동대문01번)</span>
        </li>
        <li>
          <span class="label">주차</span>
          <span>경희대 교내 주차장 / 최초 30분 2,000원, 이후 10분당 500원</span>
        </li>
      </ul>
    </section>

    <section>
      <h2 class="section-title">지도</h2>
      <div class="map-embed">
        <iframe
          src="https://www.google.com/maps?q=%EA%B2%BD%ED%9D%AC%EB%8C%80%ED%95%99%EA%B5%90%20%ED%8F%89%ED%99%94%EC%9D%98%EC%A0%84%EB%8B%B9&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="경희대학교 평화의전당 지도"></iframe>
      </div>
    </section>

    <section>
      <h2 class="section-title">주변 맛집</h2>
      <div class="btn-row">
        <!-- TODO: 주변 맛집 가이드 외부 링크 URL 로 교체 -->
        <a class="btn ghost" href="#" target="_blank" rel="noopener">주변 맛집 가이드 (준비 중)</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    마지막 업데이트: 2026-06-06
